<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" shape-rendering="crispEdges">
  <rect width="96" height="96" fill="#0b0f18"/>
  <!-- Capucha/Gorro -->
  <rect x="28" y="10" width="40" height="16" fill="#1a1a2e"/>
  <rect x="26" y="20" width="44" height="4" fill="#2d2d44"/>
  <!-- Cabeza -->
  <rect x="32" y="24" width="32" height="12" fill="#d8c08a"/>
  <!-- Máscara/Antifaz -->
  <rect x="34" y="28" width="8" height="4" fill="#1a1a2e"/>
  <rect x="54" y="28" width="8" height="4" fill="#1a1a2e"/>
  <!-- Cuerpo (traje oscuro ajustado) -->
  <rect x="22" y="36" width="52" height="36" fill="#2a2a3e"/>
  <!-- Línea central (división) -->
  <rect x="46" y="36" width="4" height="36" fill="#1a1a2e"/>
  <!-- Cinturón con hebilla -->
  <rect x="20" y="64" width="56" height="4" fill="#8b6914"/>
  <rect x="44" y="62" width="8" height="8" fill="#ffd700"/>
  <!-- Brazos (ágiles) -->
  <rect x="14" y="40" width="8" height="28" fill="#1a1a2e"/>
  <rect x="74" y="40" width="8" height="28" fill="#1a1a2e"/>
  <!-- Manos con dagas -->
  <rect x="12" y="64" width="3" height="3" fill="#d8c08a"/>
  <rect x="81" y="64" width="3" height="3" fill="#d8c08a"/>
  <!-- Dagas -->
  <rect x="10" y="58" width="2" height="10" fill="#696969"/>
  <rect x="84" y="58" width="2" height="10" fill="#696969"/>
  <!-- Punta de dagas -->
  <rect x="9" y="56" width="4" height="2" fill="#c0c0c0"/>
  <rect x="83" y="56" width="4" height="2" fill="#c0c0c0"/>
  <!-- Pantalones -->
  <rect x="26" y="72" width="44" height="8" fill="#1a1a2e"/>
  <!-- Botas -->
  <rect x="20" y="80" width="56" height="12" fill="#0a0a0f"/>
</svg>
