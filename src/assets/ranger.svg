<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" shape-rendering="crispEdges">
  <rect width="96" height="96" fill="#0b0f18"/>
  <!-- Sombrero/Capucha de ranger -->
  <rect x="30" y="10" width="36" height="12" fill="#5c4033"/>
  <rect x="28" y="20" width="40" height="4" fill="#6c5c4d"/>
  <!-- Cabeza -->
  <rect x="32" y="24" width="32" height="12" fill="#d8c08a"/>
  <!-- Cuerpo (túnica de cuero) -->
  <rect x="22" y="36" width="52" height="36" fill="#6c5c4d"/>
  <!-- Adornos de cuero -->
  <rect x="26" y="40" width="44" height="28" fill="#8b7355"/>
  <!-- Brazos -->
  <rect x="14" y="40" width="8" height="32" fill="#6c5c4d"/>
  <rect x="74" y="40" width="8" height="32" fill="#6c5c4d"/>
  <!-- Manos -->
  <rect x="12" y="68" width="4" height="4" fill="#d8c08a"/>
  <rect x="80" y="68" width="4" height="4" fill="#d8c08a"/>
  <!-- Arco en la mano derecha -->
  <rect x="78" y="50" width="4" height="28" fill="#8b6914"/>
  <rect x="76" y="52" width="8" height="2" fill="#8b6914"/>
  <rect x="76" y="76" width="8" height="2" fill="#8b6914"/>
  <!-- Cuerda del arco -->
  <rect x="80" y="52" width="1" height="24" fill="#d4a574"/>
  <!-- Flecha -->
  <rect x="60" y="60" width="16" height="2" fill="#8b6914"/>
  <rect x="76" y="59" width="4" height="4" fill="#c0c0c0"/>
  <!-- Carcaj en la espalda (rectangulos) -->
  <rect x="30" y="44" width="8" height="20" fill="#5c4033"/>
  <rect x="38" y="44" width="8" height="20" fill="#5c4033"/>
  <!-- Flechas en el carcaj -->
  <rect x="32" y="48" width="2" height="12" fill="#8b6914"/>
  <rect x="40" y="50" width="2" height="12" fill="#8b6914"/>
  <!-- Pantalones -->
  <rect x="26" y="72" width="44" height="8" fill="#5c4033"/>
  <!-- Botas -->
  <rect x="20" y="80" width="56" height="12" fill="#1f2740"/>
</svg>
