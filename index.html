<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>One Card Dungeon - Mapa</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body class="is-on-title">
  <div id="title-screen" class="title-screen" aria-label="Pantalla de titulo">
    <div class="title-screen-card">
      <p class="title-kicker">Roguelike de bolsillo</p>
      <h1 class="title-game-name">One Card Dungeon</h1>
      <div class="title-sword-divider" aria-hidden="true">
        <span class="title-sword-guard"></span>
        <span class="title-sword-blade"></span>
      </div>

      <section class="title-hero-stage" aria-hidden="true">
        <span class="title-hero-backglow"></span>
        <img class="title-hero-image" src="./src/assets/Incio.png" alt="" />
        <span class="title-hero-torchglow"></span>
      </section>

      <p class="title-tagline">Entra en la mazmorra. Sobrevive 12 niveles.</p>

      <div class="title-actions">
        <button id="title-start" class="title-btn title-btn-start" type="button">Comenzar aventura</button>
        <button id="title-load" class="title-btn" type="button">Cargar partida</button>
        <button id="title-options" class="title-btn" type="button">Opciones</button>
        <button id="title-tutorial" class="title-btn" type="button">Tutorial</button>
      </div>

      <section id="title-options-panel" class="title-options-panel" aria-hidden="true">
        <h2 class="title-options-title">Opciones</h2>
        <label class="title-option-row" for="title-volume">
          Volumen musica
          <input id="title-volume" type="range" min="0" max="1" step="0.05" value="0.55" />
        </label>
        <label class="title-option-row" for="title-muted">
          <input id="title-muted" type="checkbox" />
          Silenciar musica
        </label>
      </section>
    </div>
  </div>

  <main class="app">
    <header class="topbar">
      <p id="level-indicator" class="level-indicator">Nivel 1</p>
    </header>

  <section class="panel">
    <div class="layout">
      <div class="enemy-column">
        <div id="enemy-list-center" class="enemy-list-center"></div>
        <aside id="enemy-panel" class="sidebar"></aside>
      </div>

      <div class="map-column">
        <div id="game-board" class="game-stage"></div>
        <aside id="phase-panel" class="sidebar"></aside>
      </div>

      <div class="phase-column">
        <aside id="player-panel" class="sidebar"></aside>
        <div id="board-actions-center" class="board-actions board-actions-center">
          <button id="next-phase" class="btn-next-phase" type="button">Finalizar turno</button>
          <button id="next-level" class="btn-next-level" type="button">Pasar nivel</button>
          <button id="save-game" class="btn-next-level" type="button">Guardar partida</button>
        </div>
      </div>
    </div>
  </section>

  <div class="in-game-options" id="in-game-options">
    <button id="game-options-open" class="in-game-options-open" type="button">Opciones</button>
    <section id="game-options-panel" class="in-game-options-panel" aria-hidden="true">
      <h2 class="in-game-options-title">Musica</h2>
      <label class="in-game-option-row" for="game-volume">
        Volumen
        <input id="game-volume" type="range" min="0" max="1" step="0.05" value="0.55" />
      </label>
      <label class="in-game-option-row" for="game-muted">
        <input id="game-muted" type="checkbox" />
        Silenciar
      </label>
    </section>
  </div>

  <button id="tutorial-open" class="tutorial-fab" type="button">Tutorial</button>

  <div id="character-modal" class="character-modal" aria-hidden="true">
    <div class="character-card" role="dialog" aria-modal="true" aria-labelledby="character-title">
      <h2 id="character-title" class="character-title">Elige tu clase</h2>
      <p class="character-subtitle">Selecciona un personaje antes de adentrarte en la mazmorra.</p>
      <div id="character-options" class="character-options"></div>
    </div>
  </div>

  </main>

  <div id="tutorial-modal" class="tutorial-modal" aria-hidden="true">
    <div class="tutorial-card" role="dialog" aria-modal="true" aria-labelledby="tutorial-title">
      <h2 id="tutorial-title" class="tutorial-title">Tutorial</h2>
      <div id="tutorial-visual" class="tutorial-visual" aria-hidden="true"></div>
      <p id="tutorial-text" class="tutorial-text"></p>
      <div class="tutorial-footer">
        <span id="tutorial-step" class="tutorial-step"></span>
        <div class="tutorial-actions">
          <button id="tutorial-skip" class="tutorial-btn tutorial-skip" type="button">Atrás</button>
          <button id="tutorial-next" class="tutorial-btn tutorial-next" type="button">Siguiente</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="./dist/main.js"></script>
</body>
</html>
