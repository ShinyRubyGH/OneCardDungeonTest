<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>One Card Dungeon - Mapa</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="app">
    <header class="topbar">
      <p id="level-indicator" class="level-indicator">Nivel 1</p>
    </header>

  <section class="panel">
    <div class="layout">
      <div class="enemy-column">
        <div id="enemy-list-center" class="enemy-list-center"></div>
        <aside id="enemy-panel" class="sidebar"></aside>
      </div>

      <div class="map-column">
        <div id="game-board" class="game-stage"></div>
        <aside id="phase-panel" class="sidebar"></aside>
      </div>

      <div class="phase-column">
        <aside id="player-panel" class="sidebar"></aside>
        <div id="board-actions-center" class="board-actions board-actions-center">
          <button id="next-phase" class="btn-next-phase" type="button">Finalizar turno</button>
          <button id="next-level" class="btn-next-level" type="button">Pasar nivel</button>
        </div>
      </div>
    </div>
  </section>

  <button id="tutorial-open" class="tutorial-fab" type="button">Tutorial</button>

  <div id="character-modal" class="character-modal" aria-hidden="true">
    <div class="character-card" role="dialog" aria-modal="true" aria-labelledby="character-title">
      <h2 id="character-title" class="character-title">Elige tu clase</h2>
      <p class="character-subtitle">Selecciona un personaje antes de adentrarte en la mazmorra.</p>
      <div id="character-options" class="character-options"></div>
    </div>
  </div>

  <div id="tutorial-modal" class="tutorial-modal" aria-hidden="true">
    <div class="tutorial-card" role="dialog" aria-modal="true" aria-labelledby="tutorial-title">
      <h2 id="tutorial-title" class="tutorial-title">Tutorial</h2>
      <div id="tutorial-visual" class="tutorial-visual" aria-hidden="true"></div>
      <p id="tutorial-text" class="tutorial-text"></p>
      <div class="tutorial-footer">
        <span id="tutorial-step" class="tutorial-step"></span>
        <div class="tutorial-actions">
          <button id="tutorial-skip" class="tutorial-btn tutorial-skip" type="button">Atrás</button>
          <button id="tutorial-next" class="tutorial-btn tutorial-next" type="button">Siguiente</button>
        </div>
      </div>
    </div>
  </div>
  </main>

  <script type="module" src="./dist/main.js"></script>
</body>
</html>
